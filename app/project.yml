name: BsnsSSH
options:
  bundleIdPrefix: cc.bsns
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  bsns-ssh:
    path: ..
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.13.0"
targets:
  BsnsSSH:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: bsns-ssh
        product: BsnsSSHCore
      - package: SwiftTerm
        product: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cc.bsns.ssh
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        # App UI layer stays Swift 5 mode for now; the BsnsSSHCore package is
        # already Swift 6 strict-concurrency clean on its own.
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
