name: BsnsSSH
options:
  bundleIdPrefix: cc.bsns
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  bsns-ssh:
    path: ..
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.13.0"
  CSSH:
    # Vendored locally (vendor/CSSH/CSSH.xcframework) — xcodebuild's package
    # downloader stalls on the GitHub release asset in this environment, so we
    # fetch it ourselves (vendor/fetch-cssh.sh) and reference it by path.
    path: vendor/CSSH
targets:
  BsnsSSH:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: bsns-ssh
        product: BsnsSSHCore
      - package: SwiftTerm
        product: SwiftTerm
      - package: CSSH
        product: CSSH
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cc.bsns.ssh
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "4"
        # App UI layer stays Swift 5 mode for now; the BsnsSSHCore package is
        # already Swift 6 strict-concurrency clean on its own.
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Connecting to LAN / tailnet SSH hosts trips iOS's local-network gate.
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Connect to SSH servers on your local network."
        # Ships only standard/exempt encryption (SSH via OpenSSL) — declare it
        # so App Store Connect never re-asks the encryption questionnaire.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        # Signing for device + TestFlight (Graham Saathoff's team).
        DEVELOPMENT_TEAM: "4L394FY4WC"
        CODE_SIGN_STYLE: Automatic
