name: BsnsSSH
options:
  bundleIdPrefix: cc.bsns
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  bsns-ssh:
    path: ..
  SwiftTerm:
    # Vendored fork (vendor/SwiftTerm) of upstream 1.13.0, patched for pointer
    # click-drag selection + PageUp/PageDown-to-remote. See vendor/SwiftTerm/PATCHES.md.
    path: vendor/SwiftTerm
  CSSH:
    # Vendored locally (vendor/CSSH/CSSH.xcframework), built from source by
    # vendor/build-cssh.sh — libssh2 1.11.0 on OpenSSL 3.5.1, pinned + sha256-
    # verified. Referenced by path; the xcframework itself is gitignored.
    path: vendor/CSSH
  YubiKit:
    url: https://github.com/Yubico/yubikit-swift
    exactVersion: "1.3.0"
  CMosh:
    # Vendored mosh client + protobuf-lite (C++ with a plain-C interface).
    # Run vendor/mosh/fetch-mosh.sh to populate its source trees.
    path: vendor/mosh
targets:
  BsnsSSH:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: bsns-ssh
        product: BsnsSSHCore
      - package: SwiftTerm
        product: SwiftTerm
      - package: CSSH
        product: CSSH
      - package: YubiKit
        product: YubiKit
      - package: CMosh
        product: CMosh
    # A managed Info.plist (rather than GENERATE_INFOPLIST_FILE) because the NFC
    # ISO7816 select-identifiers list is an array, which build settings can't set.
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: bsns.SSH
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Connecting to LAN / tailnet SSH hosts trips iOS's local-network gate.
        NSLocalNetworkUsageDescription: "Connect to SSH servers on your local network."
        # Required to evaluate Face ID for the optional app lock.
        NSFaceIDUsageDescription: "Unlock the app with Face ID."
        # Talk to a YubiKey over NFC.
        NFCReaderUsageDescription: "Communicate with your YubiKey over NFC to sign in."
        # AIDs the app may select over NFC: YubiKey management, FIDO, OATH, PIV.
        com.apple.developer.nfc.readersession.iso7816.select-identifiers:
          - A000000527471117
          - A0000006472F0001
          - A0000005272101
          - A000000308
        # Ships only standard/exempt encryption (SSH via OpenSSL) — declare it
        # so App Store Connect never re-asks the encryption questionnaire.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cc.bsns.ssh
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "82"
        # App UI layer stays Swift 5 mode for now; the BsnsSSHCore package is
        # already Swift 6 strict-concurrency clean on its own.
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Signing for device + TestFlight (Graham Saathoff's team).
        DEVELOPMENT_TEAM: "4L394FY4WC"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: BsnsSSH.entitlements
      properties:
        # USB-C smart-card access for YubiKey PIV.
        com.apple.security.smartcard: true
        # NFC ISO7816 (tag) reading for YubiKey-over-NFC.
        com.apple.developer.nfc.readersession.formats: [TAG]
        # FIDO2 security keys / passkeys (WebAuthn) — associates the app with the
        # relying-party domain (tools.bsns.cc serves the matching AASA). Required
        # for the platform-passkey provider; harmless for external security keys.
        com.apple.developer.associated-domains:
          - webcredentials:tools.bsns.cc
